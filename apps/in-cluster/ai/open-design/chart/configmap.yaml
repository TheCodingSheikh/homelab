apiVersion: v1
kind: ConfigMap
metadata:
  name: open-design-proxy
data:
  default.conf.template: |
    server {
        listen ${PROXY_PORT};

        location /nginx-health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://${OD_BIND_HOST}:${OD_WEB_PORT};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        }

        location /api/ {
            proxy_pass http://${OD_BIND_HOST}:${OD_WEB_PORT};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;

            proxy_set_header Authorization "Bearer ${PROXY_API_TOKEN}";

            # Critical for Server-Sent Events (SSE)
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_set_header Connection '';
            http2_push_preload on;
        }
    }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: llm-relay
spec:
  secretName: llm-relay-tls
  dnsNames:
    - llm.lab.com
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-relay-conf
data:
  default.conf: |
    server {
        listen 127.0.0.1:443 ssl;
        server_name llm.lab.com;

        ssl_certificate     /etc/relay-tls/tls.crt;
        ssl_certificate_key /etc/relay-tls/tls.key;

        location / {
            proxy_pass http://litellm.litellm:4000;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }