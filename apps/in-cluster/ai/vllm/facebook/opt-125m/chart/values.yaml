servingEngineSpec:
  enableEngine: true
  runtimeClassName: ""

  modelSpec:
    - name: "model"
      repository: "vllm/vllm-openai"
      tag: "latest"
      modelURL: "facebook/opt-125m"
      replicaCount: 1
      requestCPU: 1
      requestMemory: "2Gi"
      limitCPU: "1"
      limitMemory: "2Gi"
      shmSize: "1Gi"
      vllmConfig:
        dtype: "auto"
        maxModelLen: 512
        tensorParallelSize: 1
        maxNumSeqs: 4
        enablePrefixCaching: true
        enableChunkedPrefill: false
        extraArgs:
          - "--device=cpu"

      lmcacheConfig:
        enabled: false

  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
    httpGet:
      path: /health
      port: 8000

  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
    httpGet:
      path: /health
      port: 8000

  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 3
    httpGet:
      path: /health
      port: 8000

  containerPort: 8000
  servicePort: 80

routerSpec:
  enableRouter: false
