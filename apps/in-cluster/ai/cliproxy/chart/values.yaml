      main:
        image:
          repository: eceasy/cli-proxy-api
          tag: latest
          pullPolicy: Always
        env:
          TZ: Asia/Riyadh
        resources:
          requests:
            # cpu: 500m
            # memory: 256Mi
          limits:
            cpu: 500m
            memory: 256Mi

service:
  main:
    controller: main
    ports:
      main:
        port: 8317
      # proxy:
      #   port: 8000

persistence:
  config:
    type: configMap
    name: cliproxy-config
    globalMounts:
      - path: /CLIProxyAPI/config.yaml
        subPath: config.yaml
        readOnly: true

  auth-dir:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 100Mi
    globalMounts:
      - path: /root/.cli-proxy-api

configMaps:
  config:
    data:
      config.yaml: |
        host: ""
        port: 8317

        api-keys:
          - "secret"

        auth-dir: "~/.cli-proxy-api"

        debug: false
        request-retry: 3

        routing:
          strategy: "round-robin"