apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-secret-external-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: grafana-secret
  data:
  - secretKey: admin-user
    remoteRef:
      key: monitoring/grafana
      property: admin-user
  - secretKey: admin-password
    remoteRef:
      key: monitoring/grafana
      property: admin-password

