apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana

resources:
  - externalsecret.yaml
  - pushsecret.yaml
  
helmCharts:
- name: grafana
  repo: https://grafana.github.io/helm-charts
  version: 8.10.0
  includeCRDs: true
  namespace: grafana
  releaseName: grafana
  valuesFile: values.yaml
