apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tempo-s3
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: tempo-s3
  data:
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: storage/seaweedfs/monitoring
        property: access-key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: storage/seaweedfs/monitoring
        property: secret-key