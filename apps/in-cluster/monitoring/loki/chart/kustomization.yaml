namespace: monitoring

resources:
  - externalsecret.yaml

helmCharts:
- name: loki
  repo: https://grafana.github.io/helm-charts
  version: 7.0.0
  includeCRDs: true
  namespace: monitoring
  releaseName: loki
  valuesFile: values.yaml
