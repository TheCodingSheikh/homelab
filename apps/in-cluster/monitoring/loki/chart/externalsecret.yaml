apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-s3-external-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: loki-s3
  data:
  - secretKey: AWS_ACCESS_KEY_ID
    remoteRef:
      key: storage/seaweedfs/monitoring
      property: access-key
  - secretKey: AWS_SECRET_ACCESS_KEY
    remoteRef:
      key: storage/seaweedfs/monitoring
      property: secret-key
