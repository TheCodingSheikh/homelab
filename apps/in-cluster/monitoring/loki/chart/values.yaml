deploymentMode: SingleBinary

global:
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: ""
      region: ""
      accessKeyId: ${AWS_ACCESS_KEY_ID}
      secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
  ingester:
    chunk_encoding: snappy
  compactor:
    retention_enabled: true
    delete_request_store: s3
  limits_config:
    allow_structured_metadata: true
    retention_period: 24h
  rulerConfig:
    wal:
      dir: /var/loki/ruler-wal
    remote_write:
      enabled: true
      client:
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write

singleBinary:
  replicas: 1
  persistence:
    size: 2Gi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
gateway:
  replicas: 1

chunksCache:
  enabled: false
resultsCache:
  enabled: false

lokiCanary:
  enabled: false
test:
  enabled: false
monitoring:
  serviceMonitor:
    enabled: true
