apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agent-sandbox

resources:
  - https://github.com/kubernetes-sigs/agent-sandbox/releases/download/v0.4.6/manifest.yaml
  
patches:
  - target:
      kind: Deployment
      name: agent-sandbox-controller
    patch: |
      $patch: delete
      kind: Deployment
      metadata:
        name: agent-sandbox-controller