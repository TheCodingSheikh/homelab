#       name: litellm-org-rate-limit-patch
#       defaultMode: 0755

redis:
  enabled: false

# resources:
#   limits:
#     cpu: "4"
#     memory: "8Gi"
#   requests:
#     cpu: "4"
#     memory: "8Gi"

separateHealthApp: true

# serviceMonitor:
#   enabled: true

proxy_config:
  model_list:
    - model_name: "qwen3:0.6b"             
      litellm_params:
        model: "ollama/qwen3:0.6b"
        api_base: "http://qwen3-0-6b-ollama.ai:11434"
  sso_settings:
    role_mappings:
      provider: "generic"
      group_claim: "groups"
      default_role: "internal_user"
      roles:
        proxy_admin: ["litellm-admins"]

  router_settings:
    routing_strategy: simple-shuffle
    # redis_host: os.environ/REDIS_HOST
    # redis_port: os.environ/REDIS_PORT
    # redis_password: os.environ/REDIS_PASSWORD

  general_settings:
    proxy_batch_write_at: 60
    database_connection_pool_limit: 10
    disable_error_logs: True
    allow_requests_on_db_unavailable: True
    litellm_jwtauth:
      team_ids_jwt_field: "groups"
    # custom_sso: "custom_sso.custom_sso_handler"
  
  litellm_settings:
    # cache: True
    # cache_params:
    #   type: redis
    #   host: os.environ/REDIS_HOST
    #   port: os.environ/REDIS_PORT
    #   password: os.environ/REDIS_PASSWORD
    set_verbose: False
    json_logs: true   
    default_internal_user_params:
      user_role: "internal_user"
      models: ["all-proxy-models"]

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: lab-issuer
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "LiteLLM"
    gethomepage.dev/icon: "litellm.png"
  hosts:
    - host: llm.lab.com
      paths:
        - path: /
          pathType: Prefix
  tls:
   - secretName: litellm-tls
     hosts:
       - llm.lab.com
