replicaCount: 1

command: 
  - /bin/bash 
  - -c
  - |
    sed -i '/def is_premium(self) -> bool:/a\        return True' /app/litellm/proxy/auth/litellm_license.py /usr/lib/python3.13/site-packages/litellm/proxy/auth/litellm_license.py 2>/dev/null
    sed -i 's/premium_user: bool = _license_check.is_premium()/premium_user: bool = True/g; s/premium_user = _license_check.is_premium()/premium_user = True/g' /app/litellm/proxy/proxy_server.py /usr/lib/python3.13/site-packages/litellm/proxy/proxy_server.py 2>/dev/null
    find /app /usr/lib/python3.13 -name "*.pyc" -delete 2>/dev/null; find /app /usr/lib/python3.13 -name __pycache__ -exec rm -rf {} + 2>/dev/null
    docker/prod_entrypoint.sh --config /etc/litellm/config.yaml

envVars:
  LITELLM_LICENSE: "bypass"
  DOCS_TITLE: "MYLLM"
  GENERIC_CLIENT_ID: litellm
  GENERIC_CLIENT_SECRET: "tVphFDdl26D8yG8VrlhsPO7M9V5y9vls"
  GENERIC_AUTHORIZATION_ENDPOINT: "https://sso.lab.com/realms/lab/protocol/openid-connect/auth"
  GENERIC_TOKEN_ENDPOINT: "https://sso.lab.com/realms/lab/protocol/openid-connect/token"
  GENERIC_USERINFO_ENDPOINT: "https://sso.lab.com/realms/lab/protocol/openid-connect/userinfo"
  GENERIC_USER_ID_ATTRIBUTE: "preferred_username"
  GENERIC_USER_EMAIL_ATTRIBUTE: "email"
  GENERIC_USER_DISPLAY_NAME_ATTRIBUTE: "preferred_username"
  GENERIC_USER_FIRST_NAME_ATTRIBUTE: "given_name"
  GENERIC_USER_LAST_NAME_ATTRIBUTE: "family_name"
  GENERIC_INCLUDE_CLIENT_ID: "true"
  GENERIC_SCOPE: "openid profile email litellm"
  GENERIC_USER_ROLE_ATTRIBUTE: "litellm"
  LITELLM_LOG: ERROR
  LITELLM_MODE: PRODUCTION
  DISABLE_SCHEMA_UPDATE: "true"
  LITELLM_SALT_KEY: "sk-1234"
  USE_PRISMA_MIGRATE: "True"

image:
  pullPolicy: IfNotPresent

podAnnotations:
  inject-certs: "enabled"

# volumeMounts:
