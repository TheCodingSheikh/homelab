apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - externalsecret.yaml
  - pushsecret.yaml
  - servicemonitor.yaml

helmCharts:
  - name: coder
    repo: https://helm.coder.com/v2
    version: 2.34.6
    releaseName: coder
    namespace: coder
    valuesFile: values.yaml
    includeCRDs: true
