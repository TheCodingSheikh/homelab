apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: app-template
    repo: https://bjw-s-labs.github.io/helm-charts
    version: 4.6.2
    releaseName: code-marketplace
    namespace: coder
    valuesFile: values.yaml

configMapGenerator:
  - name: code-marketplace-seed-script
    files:
      - seed.sh
    options:
      disableNameSuffixHash: true
