apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coder-admin-externalsecret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: coder-admin
  data:
    - secretKey: password
      remoteRef:
        key: platform/coder/users/admin
        property: password
