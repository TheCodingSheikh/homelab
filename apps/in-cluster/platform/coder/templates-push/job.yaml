apiVersion: batch/v1
kind: Job
metadata:
  name: coder-templates-push
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: push
          image: ghcr.io/coder/coder:v2.35.2
          command:
            - /bin/sh
            - /scripts/push.sh
          env:
            - name: CODER_URL
              value: http://coder.coder.svc.cluster.local
            - name: CODER_ADMIN_USERNAME
              value: admin
            - name: CODER_ADMIN_EMAIL
              value: admin@lab.com
            - name: CODER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coder-admin
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: push-script
              mountPath: /scripts
              readOnly: true
            - name: templates
              mountPath: /templates-src
              readOnly: true
      volumes:
        - name: push-script
          configMap:
            name: coder-templates-push-script
        - name: templates
          configMap:
            name: coder-templates
