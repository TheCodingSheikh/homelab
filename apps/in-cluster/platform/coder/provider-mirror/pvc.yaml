apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: coder-tf-providers
  annotations:
    # Same wave as the populate Job so the WaitForFirstConsumer volume binds
    # when the Job mounts it, both before the coder deployment (wave 0).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
