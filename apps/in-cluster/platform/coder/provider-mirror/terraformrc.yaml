apiVersion: v1
kind: ConfigMap
metadata:
  name: coder-terraformrc
data:
  # Coder's server-side terraform reads this via TF_CLI_CONFIG_FILE. Every
  # provider under registry.terraform.io is served from the local filesystem
  # mirror (populated by the provider-mirror Job onto the coder-tf-providers
  # PVC) and never fetched over the network -> airgapped provisioning.
  terraformrc: |
    provider_installation {
      filesystem_mirror {
        path    = "/providers"
        include = ["registry.terraform.io/*/*"]
      }
      direct {
        exclude = ["registry.terraform.io/*/*"]
      }
    }
