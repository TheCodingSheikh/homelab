apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-dynamic-plugins
  namespace: backstage
data:
  dynamic-plugins.yaml: |
    includes:
      - "dynamic-plugins.default.yaml"
    plugins:
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-header
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-signals-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-signals
        disabled: false  
      - package: ./dynamic-plugins/dist/backstage-community-plugin-analytics-provider-segment
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-scaffolder-backend-module-kubernetes-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-scaffolder-backend-module-quay-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-scaffolder-backend-module-regex-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-analytics-module-adoption-insights-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-quickstart
        disabled: true
      # - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-catalog-backend-module-extensions-dynamic
      #   disabled: true
      # - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-extensions-backend-dynamic
      #   disabled: true
      # - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-extensions
      #   disabled: true
      - package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-github-dynamic
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-scaffolder-backend-module-utils:bs_1.45.3__4.1.1
        disabled: false
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-scaffolder-relation-processor-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-rbac
        disabled: true
                    
      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/thecodingsheikh-backstage-plugin-scaffolder-field-validator-v1.2.1/thecodingsheikh-backstage-plugin-scaffolder-field-validator-dynamic-1.2.1.tgz"
        integrity: sha512-QSws6EZXGHKWQ5uklZFCEqcA/v9aowuygqbukBkqz2FEVb1b0S0k/ATrfPNW0mEYsrX5D7zU59m/bLO7ipE15A==
        pluginConfig:
          dynamicPlugins:
            frontend:
              thecodingsheikh.backstage-plugin-scaffolder-field-validator:
                scaffolderFieldExtensions:
                  - importName: ScaffolderFieldValidatorExtension

      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/thecodingsheikh-backstage-plugin-entity-scaffolder-v0.4.0/thecodingsheikh-backstage-plugin-entity-scaffolder-dynamic-0.4.0.tgz"
        integrity: sha512-Y7AwItAg5flq9Tvdz3zWgonws14rPllTFHcAjOIYOGreMbP55sOlP/dQIX07iRqK5Q+y2Crh4cLq490Yn0aNIQ==
        pluginConfig:
          dynamicPlugins:
            frontend:
              thecodingsheikh.backstage-plugin-entity-scaffolder:
                entityTabs:
                  - path: /entity-scaffolder
                    title: Manage
                    mountPoint: entity.page.entity-scaffolder
                mountPoints:
                  - mountPoint: entity.page.entity-scaffolder/cards
                    importName: EntityScaffolderContent
                    config:
                      layout:
                        gridColumn: "1 / -1"
                      if:
                        allOf:
                          - isEntityScaffolderAvailable

      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/thecodingsheikh-backstage-plugin-catalog-backend-module-kubernetes-v0.1.2/thecodingsheikh-backstage-plugin-catalog-backend-module-kubernetes-dynamic-0.1.2.tgz"
        integrity: sha512-U3TrsXY1O+mgBc3he60yp3BWQCzS/xfqALQIE6bYqdRYo3FJh+aONrej30wdD+hLNc4Pv95Fjhtc4qDKCVYdNQ==
        pluginConfig:
          catalog:
            providers:
              kubernetes:
                main:
                  mappings:
                    namespaceModel: 'default'
                    nameModel: 'name-kind'
                    titleModel: 'name'
                    systemModel: 'namespace'
                    referencesNamespaceModel: 'default'
                  components:
                    enabled: true
                  schedule:
                    frequency: { seconds: 20 }
                    timeout: { seconds: 600 }
              
      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/thecodingsheikh-backstage-plugin-catalog-backend-module-multi-owner-processor-v1.0.5/thecodingsheikh-backstage-plugin-catalog-backend-module-multi-owner-processor-dynamic-1.0.5.tgz"
        integrity: sha512-z8KNGHlsbc3AupG+1ppQz59XOyH5anB2s5A/ZtR5TqiUPiQQLWgZqFNImEQT8PKFKidAEqBaJ4j1KLN5Z9vFGA==

      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/thecodingsheikh-backstage-plugin-multi-owner-v1.0.5/thecodingsheikh-backstage-plugin-multi-owner-dynamic-1.0.5.tgz"
        integrity: sha512-f/EelhOymAlBJtO0lLL6D7kJU7HpykH3AhKGoXn42KnbJEwLFq3tf9k/Oq1zvGBOQtlYctxhvzy7h5OrtiMlzQ==
        pluginConfig:
          dynamicPlugins:
            frontend:
              thecodingsheikh.backstage-plugin-multi-owner:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: EntityMultiOwnerCard
                    config:
                      layout:
                        gridColumnEnd:
                          lg: "span 8"
                          xs: "span 12"
                      if:
                        allOf:
                          - isMultiOwnerAvailable

      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/roadiehq-plugin-scaffolder-frontend-module-http-request-field-v2.3.0/roadiehq-plugin-scaffolder-frontend-module-http-request-field-dynamic-2.3.0.tgz"
        integrity: sha512-V2hdoiaiOR5Bi4SACpk9kGhhdez9exHO0g7Qpm62vp2K8KXKWKQds5V7FBaj1uJ6Df4KuqZV6MSw01aUIs4Sgg==
        pluginConfig:
          dynamicPlugins:
            frontend:
              roadiehq.plugin-scaffolder-frontend-module-http-request-field:
                scaffolderFieldExtensions:
                  - importName: SelectFieldFromApiExtension
                            
      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/backstage-community-plugin-vault-v0.13.0/backstage-community-plugin-vault-dynamic-0.13.0.tgz"
        integrity: sha512-cO7o096krIvIFO9XewJq8PgicuihrD6SyMnA3/D3CCj3XY60sLUz6PbEDebEcE4rjhdH0sfMS94B7OCU9KwBKg==
        pluginConfig:
          vault:
            baseUrl: ${VAULT_BASE_URL}
            publicUrl: ${VAULT_PUBLIC_URL}
            auth:
              type: static
              secret: ${VAULT_TOKEN}
            secretEngine: secrets
            kvVersion: 2
          dynamicPlugins:
            frontend:
              backstage-community.plugin-vault:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: EntityVaultCard
                    config:
                      layout:
                        gridColumnEnd:
                          lg: "span 8"
                          xs: "span 12"
                      if:
                        allOf:
                          - isKind: component
                          - hasAnnotation: vault.io/secrets-path
              
      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/backstage-community-plugin-vault-backend-v0.15.0/backstage-community-plugin-vault-backend-dynamic-0.15.0.tgz"
        integrity: sha512-zHzt81qn3kUvKDAIQWIqXmO8LQWtleGMQcFjsRstICEySB0t5YivIThuZ+VWZYfHtQZFZ3mGqs4K1IwiNkXARg==

      - disabled: false
        package: "https://github.com/TheCodingSheikh/backstage-plugins/releases/download/backstage-community-plugin-grafana-v0.10.1/backstage-community-plugin-grafana-dynamic-0.10.1.tgz"
        integrity: sha512-AtA4TA2GFPHcAfcJCmulgRAh4yo90t9H38asTQULqHCmoBEnyvgq9zIsrnjfSkky+SURql6EdRKi00ofqC5pSg==
        pluginConfig:
          proxy:
            endpoints:
              /grafana/api:
                target: ${GRAFANA_ENDPOINT}/
                headers:
                  Authorization: "Bearer ${GRAFANA_TOKEN}"
          grafana:
            domain: ${GRAFANA_PUBLIC_DOMAIN}
          dynamicPlugins:
            frontend:
              backstage-community.plugin-grafana:
                entityTabs:
                  - path: /grafana
                    title: Grafana
                    mountPoint: entity.page.grafana
                mountPoints:
                  - mountPoint: entity.page.grafana/cards
                    importName: EntityOverviewDashboardViewer
                    config:
                      layout:
                        gridColumn: "1 / -1"
                      if:
                        allOf:
                          - isKind: component
                          - hasAnnotation: grafana/overview-dashboard
                  - mountPoint: entity.page.grafana/cards
                    importName: EntityGrafanaDashboardsCard
                    config:
                      layout:
                        gridColumnEnd:
                          lg: "span 8"
                          xs: "span 12"
                      if:
                        allOf:
                          - isKind: component
                          - hasAnnotation: grafana/dashboard-selector
                  - mountPoint: entity.page.grafana/cards
                    importName: EntityGrafanaAlertsCard
                    config:
                      layout:
                        gridColumnEnd:
                          lg: "span 8"
                          xs: "span 12"
                      if:
                        allOf:
                          - isKind: component
                          - anyOf:
                              - hasAnnotation: grafana/alert-label-selector
                              - hasAnnotation: grafana/tag-selector
