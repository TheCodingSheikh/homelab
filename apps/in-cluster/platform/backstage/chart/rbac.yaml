apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-rbac
  namespace: backstage
data:
  rbac-policy.csv: |
    p, role:default/all_users, catalog-entity, update, deny
    p, role:default/all_users, catalog-entity, delete, deny
    
    g, group:default/user, role:default/all_users
  conditional-policies.yaml: |
    ---
    result: CONDITIONAL
    roleEntityRef: role:default/all_users
    pluginId: catalog
    resourceType: catalog-entity
    permissionMapping:
      - read
    conditions:
      anyOf:
          - not:
              rule: HAS_ANNOTATION
              resourceType: catalog-entity
              params:
                annotation: backstage.io/rbac
          - rule: IS_ENTITY_OWNER
            resourceType: catalog-entity
            params:
              claims: ["$ownerRefs"]
    ---
    result: CONDITIONAL
    roleEntityRef: role:default/all_users
    pluginId: catalog
    resourceType: catalog-entity
    permissionMapping:
      - entity-scaffolder.edit
    conditions:
      anyOf:
        - not:
            rule: HAS_ANNOTATION
            resourceType: catalog-entity
            params:
              annotation: backstage.io/scaffolder-edit-roles
        - rule: IS_ENTITY_MULTI_OWNER_WITH_ANNOTATION_ROLE
          resourceType: catalog-entity
          params:
            claims: ["$ownerRefs"]
            annotation: backstage.io/scaffolder-edit-roles 