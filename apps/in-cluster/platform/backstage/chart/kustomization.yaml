apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: app-template
  repo: https://bjw-s-labs.github.io/helm-charts
  version: 4.6.2
  releaseName: backstage
  namespace: backstage
  valuesFile: values.yaml

resources:
  - dynamic-plugins.yaml
  - app-config.yaml
  - rbac.yaml

configMapGenerator:
  - name: backstage-dynamic-plugins-default
    namespace: backstage
    files:
      - dynamic-plugins.default.yaml=dynamic-plugins-defaults.yaml
    options:
      disableNameSuffixHash: true