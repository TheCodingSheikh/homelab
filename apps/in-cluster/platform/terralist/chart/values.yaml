controllers:
  main:
    pod:
      annotations:
        inject-certs: "enabled"
    containers:
      app:
        image:
          tag: v0.10.6
        env:
          TERRALIST_URL: "https://terralist.lab.com"
          TERRALIST_LOG_LEVEL: "info"

          TERRALIST_DATABASE_BACKEND: "sqlite"
          TERRALIST_SQLITE_PATH: "/data/terralist.db"
          TERRALIST_MODULES_STORAGE_RESOLVER: "local"
          TERRALIST_PROVIDERS_STORAGE_RESOLVER: "local"
          TERRALIST_LOCAL_STORE: "/data"

          TERRALIST_OAUTH_PROVIDER: "oidc"
          TERRALIST_OI_CLIENT_ID: "terralist"
          TERRALIST_OI_HOST: "https://sso.lab.com/realms/lab"

          TERRALIST_RBAC_DEFAULT_ROLE: "anonymous"
          TERRALIST_RBAC_POLICY_PATH: "/rbac/policy.csv"

          TERRALIST_OI_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: terralist-secret
                key: oidc-client-secret
          TERRALIST_TOKEN_SIGNING_SECRET:
            valueFrom:
              secretKeyRef:
                name: terralist-secret
                key: token-signing-secret
          TERRALIST_LOCAL_TOKEN_SIGNING_SECRET:
            valueFrom:
              secretKeyRef:
                name: terralist-secret
                key: token-signing-secret
          TERRALIST_COOKIE_SECRET:
            valueFrom:
              secretKeyRef:
                name: terralist-secret
                key: cookie-secret
      fileserver:
        image:
          repository: nginx
          tag: 1.27-alpine

service:
  main:
    ports:
      http:
        port: 5758
        targetPort: http
      files:
        port: 8080
        targetPort: 8080

configMaps:
  rbac:
    enabled: true
    data:
      policy.csv: |
        g, abdo@lab.com, role:admin
  fileserver:
    enabled: true
    data:
      default.conf: |
        server {
          listen 8080;
          server_name _;
          root /srv;
          autoindex on;
          location / {
            try_files $uri $uri/ =404;
          }
        }

persistence:
  data:
    accessMode: ReadWriteOnce
    size: 10Gi
  rbac:
    enabled: true
    type: configMap
    identifier: rbac
    globalMounts:
      - path: /rbac
        readOnly: true
  files:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    advancedMounts:
      main:
        fileserver:
          - path: /srv
  fileserver-config:
    type: configMap
    identifier: fileserver
    advancedMounts:
      main:
        fileserver:
          - path: /etc/nginx/conf.d

ingress:
  main:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: lab-issuer
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Terralist"
      gethomepage.dev/description: "Private Terraform Registry"
      gethomepage.dev/group: "Platform"
    hosts:
      - host: terralist.lab.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: terralist-tls
        hosts:
          - terralist.lab.com
  files:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: terralist.lab.com
        paths:
          - path: /files(/|$)(.*)
            pathType: ImplementationSpecific
            service:
              identifier: main
              port: files
    tls:
      - secretName: terralist-tls
        hosts:
          - terralist.lab.com
