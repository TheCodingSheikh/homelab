apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: terralist-externalsecret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: terralist-secret
  data:
    # Auto-generated by the PushSecrets in pushsecret.yaml
    - secretKey: token-signing-secret
      remoteRef:
        key: platform/terralist/token-signing-secret
        property: token-signing-secret
    - secretKey: cookie-secret
      remoteRef:
        key: platform/terralist/cookie-secret
        property: cookie-secret
    - secretKey: oidc-client-secret
      remoteRef:
        key: platform/keycloak/clients/terralist
        property: secret-key
