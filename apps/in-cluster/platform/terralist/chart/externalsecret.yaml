apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: terralist-externalsecret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: terralist-secret
  data:
    # Auto-generated by the PushSecrets in pushsecret.yaml
    - secretKey: token-signing-secret
      remoteRef:
        key: platform/terralist/token-signing-secret
        property: token-signing-secret
    - secretKey: cookie-secret
      remoteRef:
        key: platform/terralist/cookie-secret
        property: cookie-secret
    # Populated manually in Vault from the Keycloak-generated "terralist-client" secret:
    #   vault kv put <mount>/platform/terralist/oidc-client-secret oidc-client-secret=<value>
    - secretKey: oidc-client-secret
      remoteRef:
        key: platform/terralist/oidc-client-secret
        property: oidc-client-secret
