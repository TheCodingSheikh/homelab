apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: seaweedfs

helmCharts:
  - name: seaweedfs
    repo: https://seaweedfs.github.io/seaweedfs/helm
    version: 4.23.0
    releaseName: seaweedfs
    namespace: seaweedfs
    valuesFile: values.yaml
    includeCRDs: true
  - name: raw
    repo: https://thecodingsheikh.github.io/helm-charts
    version: 1.0.1
    releaseName: seaweedfs-raw
    namespace: seaweedfs
    valuesFile: values.yaml
    additionalValuesFiles:
      - raw.yaml
