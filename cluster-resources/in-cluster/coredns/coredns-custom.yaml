apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  lab.com.server: |
    lab.com:53 {
        errors
        template IN A lab.com {
            match "\.lab\.com\.$"
            answer "{{ .Name }} 60 IN A 10.43.74.217"
        }
        template IN AAAA lab.com {
            match "\.lab\.com\.$"
            rcode NOERROR
        }
    }
