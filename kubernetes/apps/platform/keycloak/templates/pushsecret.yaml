apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ printf "%s" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}-pushsecret
spec:
  updatePolicy: Replace
  secretStoreRefs:
    - name: vault-backend 
      kind: ClusterSecretStore 
  selector: 
    secret: 
      name: {{ printf "%s" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
  data: 
    - match: 
        secretKey: admin-password 
        remoteRef: 
          remoteKey: lab/apps/keycloak
          property: admin

