dex:
  config:
    issuer: https://dex.lab.alsheykh.com
    storage:
      type: kubernetes
      config:
        inCluster: true
    oauth2:
      skipApprovalScreen: true
    connectors:
      - type: oidc
        id: kanidm
        name: Kanidm
        config:
          clientID: $KANIDM_CLIENT_ID
          clientSecret: $KANIDM_CLIENT_SECRET
          redirectURI: https://dex.lab.alsheykh.com/callback
          issuer: https://auth.lab.alsheykh.com/oauth2/openid/dex
          # TODO https://github.com/dexidp/dex/pull/3188
          # enablePKCE: true
          scopes:
            - openid
            - profile
            - email
            - groups
    staticClients:
      - id: grafana-sso
        name: Grafana
        redirectURIs:
          - 'https://grafana.lab.alsheykh.com/login/generic_oauth'
        secretEnv: GRAFANA_SSO_CLIENT_SECRET
      # - id: gitea
      #   name: Gitea
      #   redirectURIs:
      #     - 'https://git.lab.alsheykh.com/user/oauth2/Dex/callback'
      #   secretEnv: GITEA_CLIENT_SECRET
  envFrom:
    - secretRef:
        name: dex-secrets
  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.tls: true
    hosts:
      - host: &host dex.lab.alsheykh.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: dex-tls-certificate
        hosts:
          - *host
