apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: config-cloudflare-ddns-externalsecret
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: config-cloudflare-ddns
    template:
      engineVersion: v2
      data:
        config.json: |
          {
            "cloudflare": [
              {
                "authentication": {
                  "api_token": {{ '"{{' }} .token {{ '}}"' }}
                },
                "zone_id": {{ '"{{' }} .alsheykh-zone-id {{ '}}"' }},
                "subdomains": [
                  {
                    "name": "waseelah.io",
                    "proxied": false
                  },
                  {
                    "name": "www",
                    "proxied": false
                  }
                ]
              },
              {
                "authentication": {
                  "api_token": {{ '"{{' }} .token {{ '}}"' }}
                },
                "zone_id": {{ '"{{' }} .waseelah-zone-id {{ '}}"' }},
                "subdomains": [
                  {
                    "name": "*",
                    "proxied": false
                  }
                ]
              }
            ],
            "a": true,
            "aaaa": false,
            "purgeUnknownRecords": false,
            "ttl": 300
          }
  data:
  - secretKey: token
    remoteRef:
      key: kv/apps/cloudflare
      property: dns-api-token
  - secretKey: alsheykh-zone-id
    remoteRef:
      key: kv/apps/cloudflare
      property: alsheykh-zone-id
  - secretKey: waseelah-zone-id
    remoteRef:
      key: kv/apps/cloudflare
      property: waseelah-zone-id

